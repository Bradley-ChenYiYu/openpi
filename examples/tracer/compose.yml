# Run with:
# docker compose -f examples/tracer/compose.yml up --build
services:
  runtime:
    image: openpi_tracer
    container_name: openpi_tracer
    depends_on:
      - openpi_server
    build:
      context: ../..
      dockerfile: examples/tracer/Dockerfile
      network: host
    init: true
    tty: true
    network_mode: host
    privileged: true
    working_dir: /openpi
    volumes:
      - $PWD:/openpi
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
    environment:
      - DISPLAY=$DISPLAY

  openpi_server:
    image: openpi_server
    build:
      context: ../..
      dockerfile: scripts/docker/serve_policy.Dockerfile
      network: host
    init: true
    tty: true
    network_mode: host
    volumes:
      - $PWD:/app
      - ${OPENPI_DATA_HOME:-~/.cache/openpi}:/openpi_assets
    environment:
      - SERVER_ARGS
      - OPENPI_DATA_HOME=/openpi_assets
      - IS_DOCKER=true

    # Comment out this block if not running on a machine with GPUs.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]